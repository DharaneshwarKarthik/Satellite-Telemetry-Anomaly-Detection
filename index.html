<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOCE Satellite Anomaly Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="app">
        <canvas id="bg-canvas"></canvas>

        <header class="glass-header">
            <div class="logo">
                <span class="orbit-icon"></span>
                <h1>GOCE MONITOR <small>v2.0</small></h1>
            </div>
            <div class="status-badge" id="global-status">
                <span class="pulse-dot"></span>
                SYSTEM NOMINAL
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="panel glass-panel tl">
                <h2>TELEMETRY FEED</h2>
                <div class="telemetry-log" id="telemetry-log">
                    <!-- Data entries injected here -->
                </div>
            </section>

            <section class="panel glass-panel tr">
                <h2>MISSION STATS</h2>
                <div class="stats-row">
                    <div class="stat-item">
                        <label>Altitude</label>
                        <span id="stat-alt">255.4 km</span>
                    </div>
                    <div class="stat-item">
                        <label>Velocity</label>
                        <span id="stat-vel">7.9 km/s</span>
                    </div>
                </div>
                <div class="stat-item large">
                    <label>Current Value</label>
                    <span id="stat-current" class="value">0.0000</span>
                </div>
                <div class="chart-container">
                    <canvas id="telemetry-chart"></canvas>
                </div>
                <div class="stat-item warning">
                    <label>Threshold</label>
                    <span id="stat-threshold">38.66</span>
                </div>
            </section>

            <section class="panel glass-panel bl notification-center">
                <h2>ALERTS</h2>
                <div id="alerts-container">
                    <div class="alert info">Awaiting satellite link...</div>
                </div>
            </section>

            <section class="panel glass-panel br transmission-stats">
                <h2>TRANSMISSION STATUS</h2>
                <div class="signal-gauge">
                    <div class="gauge-bar" id="signal-strength" style="width: 0%"></div>
                </div>
                <p id="signal-message">No active transmission</p>
            </section>
        </main>

        <div id="hud-overlay" class="hidden">
            <div class="anomaly-warning">
                <h1>ANOMALY DETECTED</h1>
                <p>UHF TELEMETRY EXCEEDS THRESHOLD</p>
                <div class="transmission-beam-active">TRANSMITTING SIGNAL...</div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>

</html>
